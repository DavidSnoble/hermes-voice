<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hermes Voice</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: #0f0f1a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            gap: 2rem;
        }
        .status {
            font-size: 1.1rem;
            color: #94a3b8;
            min-height: 1.5em;
            text-align: center;
        }
        .status.connected { color: #22c55e; }
        .status.thinking { color: #f59e0b; }
        .status.speaking { color: #3b82f6; }
        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .mic-btn:active {
            transform: scale(0.95);
        }
        .mic-btn.recording {
            background: #dc2626;
            border-color: #ef4444;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); }
            50% { box-shadow: 0 0 0 25px rgba(220, 38, 38, 0); }
        }
        .transcript {
            max-width: 90vw;
            text-align: center;
            font-size: 1.05rem;
            line-height: 1.5;
            color: #cbd5e1;
            min-height: 3em;
        }
        .transcript .you { color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 0.25rem; }
        .transcript .them { color: #e2e8f0; }
        .hint {
            position: fixed;
            bottom: 2rem;
            font-size: 0.85rem;
            color: #475569;
            text-align: center;
            width: 100%;
            padding: 0 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status" id="status">Tap and hold to talk</div>
        <button class="mic-btn" id="micBtn" aria-label="Hold to talk">🎙️</button>
        <div class="transcript" id="transcript"></div>
    </div>
    <div class="hint">Hold while speaking · Release to send</div>
    <script src="/static/app.js"></script>
</body>
</html>
